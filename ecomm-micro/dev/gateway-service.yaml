nameOverride: ""
fullnameOverride: ""
podAnnotations: {}
image:
  repository: heheh123/ecomm-gateway
  pullPolicy: Always
  tag: dev
  digest: sha256:55f0e2bb02e133501c9b3e16b1950fca1b1593f7575bc4a06a5578f9bf5a1835
service:
  type: ClusterIP
  port: 8080
ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: ecomm-public
  hosts:
    - paths:
        - path: /
          pathType: Prefix
configMap:
  enabled: true
  data:
    SPRING_PROFILES_ACTIVE: dev
    SPRING_CONFIG_IMPORT: "configserver:http://ecomm-config-ecomm-app:8080"

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 30
readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 30

