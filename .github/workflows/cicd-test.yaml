
name: Test CICD Workflow

on:   # when to trigger the workflow
  workflow_call:
    inputs:
      CICD_ENVIRONMENT:
        required: false
        type: string
        default: dev
      SERVICE_NAME:
        required: true
        type: string
      IMAGE_NAME:
        required: true
        type: string
      GIT_REPOSITORY:
        required: true
        type: string
      GIT_BRANCH:
        required: true
        type: string

jobs:
  ci_job:
    runs-on: ubuntu-latest
 
    # outputs:
    #   digest: ${{ steps.build-docker-image.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.GIT_REPOSITORY }}
          ref: ${{ inputs.GIT_BRANCH }}
          token: ${{ secrets.TOKEN_GITHUB }}


      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'  # cache deps for faster builds

      # - name: Run Test(s)
      #   run: mvn test

      - name: Build with Maven
        working-directory: services/${{ inputs.SERVICE_NAME }}
        run: mvn clean package -DskipTests


      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        id: build-docker-image
        with:
          context: services/${{ inputs.SERVICE_NAME }}
          push: true
          tags: ${{ inputs.IMAGE_NAME }}:${{ inputs.CICD_ENVIRONMENT }}


      - name: Update new image digest
        uses: mikefarah/yq@master
        with:
          cmd: yq -i '.image.digest = "${{ steps.build-docker-image.outputs.digest }}"' "services/${{ inputs.SERVICE_NAME }}/deploy/values-${{ inputs.CICD_ENVIRONMENT }}.yaml"


      # push to another repo
      - name: Commit & Push changes
        uses: actions-js/push@master
        with:
          branch: cicd
          # need PAT at both checkout + push
          github_token: ${{ secrets.TOKEN_GITHUB }}