name: Build and Push Docker image

on:
  workflow_call:
      IMAGE_TAG:
      SERVICE_NAME:
      SECURITY_SCAN_ENABLED:
      IMAGE_NAME:

jobs:
  process_docker_image:
    runs-on: ubuntu-latest

    outputs:
      image-digest: ${{ steps.build-docker-image.outputs.digest }}

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        id: build-docker-image
        with:
          context: app/services/${{ inputs.SERVICE_NAME }}
          tags: ${{ inputs.IMAGE_NAME }}:${{ inputs.IMAGE_TAG }}
          push: true


      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.33.1
        if: ${{ inputs.SECURITY_SCAN_ENABLED }}
        with:
          image-ref: ${{ inputs.IMAGE_NAME }}:${{ inputs.IMAGE_TAG }}
          format: 'sarif'
          exit-code: '1'
          output: 'trivy-results.sarif'

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ inputs.SECURITY_SCAN_ENABLED }}
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy